<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCOS V5 | Jurex Admin Edition</title>
    
    <!-- Using Multiple GunDB Peers for stability -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #a29bfe; --secondary: #6c5ce7; --bg: #0b091a;
            --glass: rgba(255, 255, 255, 0.05); --glass-heavy: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.1); --text: #ffffff;
            --msg-me: #6c5ce7; --msg-them: #2d3436; --danger: #ff7675;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth Wall */
        #authWall {
            position: fixed; inset: 0; background: radial-gradient(circle at top right, #302b63, #0f0c29);
            display: flex; align-items: center; justify-content: center; z-index: 10000;
        }
        .auth-card { background: var(--glass); backdrop-filter: blur(25px); padding: 40px; border-radius: 30px; border: 1px solid var(--border); width: 90%; max-width: 420px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .auth-card input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--border); background: rgba(0,0,0,0.4); color: white; outline: none; }
        
        .btn { padding: 12px 25px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-p { background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; width: 100%; }
        .btn-s { background: transparent; color: white; border: 1px solid var(--border); width: 100%; margin-top: 10px; }

        /* Layout */
        #app { display: none; flex-direction: column; height: 100vh; }
        header { height: 70px; background: rgba(0,0,0,0.6); display: flex; align-items: center; padding: 0 25px; border-bottom: 1px solid var(--border); justify-content: space-between; backdrop-filter: blur(10px); }
        .hamburger { font-size: 1.4rem; cursor: pointer; padding: 10px; border-radius: 8px; background: var(--glass); }

        .main-layout { display: flex; flex: 1; overflow: hidden; }
        nav.sidebar { width: 280px; background: rgba(11, 9, 26, 0.98); border-right: 1px solid var(--border); position: absolute; left: -280px; top: 0; bottom: 0; transition: 0.4s; z-index: 9999; padding-top: 20px; }
        nav.sidebar.open { left: 0; }
        .nav-item { padding: 15px 30px; cursor: pointer; display: flex; align-items: center; gap: 15px; color: #a0a0a0; }
        .nav-item:hover, .nav-item.active { background: rgba(162, 155, 254, 0.1); color: var(--primary); border-left: 4px solid var(--primary); }

        main { flex: 1; overflow-y: auto; background: radial-gradient(circle at bottom left, #1a1a2e, #0b091a); }
        .page { display: none; padding: 20px; max-width: 800px; margin: 0 auto; animation: fadeIn 0.4s; }
        .page.active { display: block; }

        /* Post Styling */
        .post-card { background: var(--glass); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: #333; }
        .post-actions { display: flex; border-top: 1px solid var(--border); padding-top: 15px; gap: 20px; margin-top: 10px; }
        .action-item { cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 0.9rem; opacity: 0.7; }
        .action-item:hover { opacity: 1; color: var(--primary); }

        /* Comment Section */
        .comment-section { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; margin-top: 15px; }
        .comment-item { font-size: 0.85rem; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .comment-input { width: 100%; background: var(--glass); border: 1px solid var(--border); padding: 10px 15px; border-radius: 20px; color: white; margin-top: 10px; outline: none; }

        /* Admin Table */
        .admin-table-container { overflow-x: auto; margin-top: 20px; background: var(--glass); border-radius: 15px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; background: rgba(255,255,255,0.05); padding: 15px; color: var(--primary); }
        td { padding: 15px; border-top: 1px solid var(--border); font-size: 0.9rem; }

        /* Global Chat */
        .chat-window { height: 60vh; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 10px; }
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 0.9rem; }
        .bubble.me { align-self: flex-end; background: var(--msg-me); }
        .bubble.them { align-self: flex-start; background: var(--glass-heavy); }

        @media (min-width: 1024px) {
            nav.sidebar { position: relative; left: 0; background: transparent; }
            .hamburger { display: none; }
        }
    </style>
</head>
<body>

    <div id="authWall">
        <div class="auth-card">
            <h1 style="color:var(--primary); margin-bottom:10px;">GCOS V5</h1>
            <p id="statusMsg" style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 10px;">Connecting to Network...</p>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn btn-p" id="loginBtn" onclick="handleAuth('signin')">Sign In</button>
            <button class="btn btn-s" onclick="handleAuth('signup')">New Account</button>
            <p id="authError" style="color: var(--danger); margin-top: 15px;"></p>
        </div>
    </div>

    <div id="app">
        <header>
            <div style="display:flex; align-items:center; gap:15px;">
                <i class="fas fa-bars hamburger" onclick="toggleSidebar()"></i>
                <h2 style="color:var(--primary)">GCOS</h2>
            </div>
            <div id="userHead" style="display:flex; align-items:center; gap:12px;">
                <span id="myName"></span>
                <img src="" id="myAvatar" class="avatar">
            </div>
        </header>

        <div class="main-layout">
            <nav class="sidebar" id="sidebar">
                <div class="nav-item active" onclick="showPage('home')"><i class="fas fa-home"></i> Home</div>
                <div class="nav-item" onclick="showPage('chat')"><i class="fas fa-comments"></i> Global Chat</div>
                <div class="nav-item" onclick="showPage('profile')"><i class="fas fa-user-circle"></i> Profile</div>
                <div class="nav-item" id="adminNav" style="display:none; color:#f1c40f" onclick="showPage('admin')"><i class="fas fa-database"></i> Admin Database</div>
                <button class="btn btn-s" onclick="logout()" style="margin: auto 20px 20px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </nav>

            <main>
                <section id="home" class="page active">
                    <div class="post-card">
                        <textarea id="postInput" class="comment-input" style="height:80px; border-radius:10px;" placeholder="What's on your mind?"></textarea>
                        <button class="btn btn-p" style="margin-top:10px; width:auto; float:right;" onclick="createPost()">Post to Network</button>
                        <div style="clear:both;"></div>
                    </div>
                    <div id="feed"></div>
                </section>

                <!-- Rest of pages remain the same structure -->
                <section id="chat" class="page">
                    <div class="post-card">
                        <div class="chat-window" id="chatWindow"></div>
                        <div style="display:flex; gap:10px; margin-top:10px;">
                            <input type="text" id="chatInput" class="comment-input" style="margin:0;" placeholder="Message...">
                            <button class="btn btn-p" style="width:50px;" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </section>

                <section id="profile" class="page">
                    <div class="post-card" style="text-align:center;">
                        <img src="" id="profAvatar" class="avatar" style="width:120px; height:120px; margin-bottom:15px; border:3px solid var(--secondary)">
                        <h2 id="profUser">Username</h2>
                        <div style="margin-top:20px; text-align:left;">
                            <label>Avatar Image URL</label>
                            <input type="text" id="avatarInput" class="comment-input" placeholder="https://url.jpg">
                            <button class="btn btn-p" style="margin-top:10px;" onclick="updateProfile()">Save Settings</button>
                        </div>
                    </div>
                </section>

                <section id="admin" class="page">
                    <h1>User Database Control</h1>
                    <div class="admin-table-container">
                        <table>
                            <thead>
                                <tr><th>User</th><th>Pass</th><th>Avatar URL</th><th>Delete</th></tr>
                            </thead>
                            <tbody id="adminUserTable"></tbody>
                        </table>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script>
        // Use multiple peers for redundancy
        const gun = Gun([
            'https://gun-manhattan.herokuapp.com/gun',
            'https://peer.wall.org/gun'
        ]);
        const user = gun.user().recall({sessionStorage: true});

        // Track connection
        gun.on('hi', () => document.getElementById('statusMsg').innerText = "Connected to Decentralized Node");

        // 1. Improved Auth Logic with Admin Auto-Registration
        function handleAuth(type) {
            const alias = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const err = document.getElementById('authError');

            if (!alias || !pass) { err.innerText = "Fill all fields"; return; }

            if (type === 'signup') {
                registerUser(alias, pass);
            } else {
                // Sign In Logic
                user.auth(alias, pass, ack => {
                    if (ack.err) {
                        // SPECIAL: If Admin credentials, try to auto-create on first login
                        if (alias === 'Jurex' && pass === 'Jurex143') {
                            err.innerText = "Initializing Admin account...";
                            registerUser(alias, pass);
                        } else {
                            err.innerText = "Error: " + ack.err + " (Try Signing Up)";
                        }
                    } else {
                        location.reload();
                    }
                });
            }
        }

        function registerUser(alias, pass) {
            user.create(alias, pass, ack => {
                if (ack.err) document.getElementById('authError').innerText = ack.err;
                else {
                    gun.get('gcos_v5_registry').get(alias).put({alias, pass, avatar: ''});
                    user.auth(alias, pass, () => location.reload());
                }
            });
        }

        function logout() { user.leave(); location.reload(); }

        // 2. Session Logic
        user.get('alias').on(name => {
            if (name) {
                document.getElementById('authWall').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('myName').innerText = name;
                document.getElementById('profUser').innerText = name;

                if (name === 'Jurex') {
                    document.getElementById('adminNav').style.display = 'flex';
                    loadAdminData();
                }

                user.get('avatar').on(url => {
                    const src = url || `https://api.dicebear.com/7.x/initials/svg?seed=${name}`;
                    document.getElementById('myAvatar').src = src;
                    document.getElementById('profAvatar').src = src;
                    gun.get('gcos_v5_registry').get(name).get('avatar').put(src);
                });
            }
        });

        // 3. UI Helpers
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (window.innerWidth < 1024) toggleSidebar();
        }

        // 4. Feed, Likes, Comments
        function createPost() {
            const body = document.getElementById('postInput').value;
            if (!body) return;
            gun.get('gcos_v5_posts').set({
                author: document.getElementById('myName').innerText,
                body: body,
                time: Date.now()
            });
            document.getElementById('postInput').value = '';
        }

        gun.get('gcos_v5_posts').map().once((data, id) => {
            if (!data || !data.body || document.getElementById('p-' + id)) return;
            const card = document.createElement('div');
            card.className = 'post-card';
            card.id = 'p-' + id;
            card.innerHTML = `
                <div class="post-header">
                    <img src="https://api.dicebear.com/7.x/initials/svg?seed=${data.author}" class="avatar" id="av-${id}">
                    <div><strong>${data.author}</strong><br><small>${new Date(data.time).toLocaleString()}</small></div>
                </div>
                <div style="padding: 10px 0;">${data.body}</div>
                <div class="post-actions">
                    <div class="action-item" onclick="likePost('${id}')"><i class="fas fa-heart"></i> <span id="lcnt-${id}">0</span> Likes</div>
                    <div class="action-item"><i class="fas fa-comment"></i> <span id="ccnt-${id}">0</span> Comments</div>
                </div>
                <div class="comment-section">
                    <div id="clist-${id}"></div>
                    <input type="text" class="comment-input" placeholder="Write a comment..." onkeypress="addComment(event, '${id}')">
                </div>
            `;
            document.getElementById('feed').prepend(card);

            gun.get('gcos_v5_registry').get(data.author).get('avatar').once(url => {
                if (url) document.getElementById('av-'+id).src = url;
            });

            // Likes
            let lcount = 0;
            gun.get('gcos_v5_posts').get(id).get('likes').map().on(val => {
                if(val) lcount++; else lcount--;
                document.getElementById('lcnt-'+id).innerText = Math.max(0, lcount);
            });

            // Comments
            let ccount = 0;
            gun.get('gcos_v5_posts').get(id).get('comments').map().on((cdata, cid) => {
                if(!cdata) return;
                ccount++;
                document.getElementById('ccnt-'+id).innerText = ccount;
                const list = document.getElementById('clist-'+id);
                if(!document.getElementById(cid)){
                    const div = document.createElement('div');
                    div.id = cid;
                    div.className = 'comment-item';
                    div.innerHTML = `<strong>${cdata.user}:</strong> ${cdata.text}`;
                    list.appendChild(div);
                }
            });
        });

        function likePost(pid) {
            const me = document.getElementById('myName').innerText;
            gun.get('gcos_v5_posts').get(pid).get('likes').get(me).put(true);
        }

        function addComment(e, pid) {
            if (e.key === 'Enter' && e.target.value) {
                gun.get('gcos_v5_posts').get(pid).get('comments').set({
                    user: document.getElementById('myName').innerText,
                    text: e.target.value,
                    time: Date.now()
                });
                e.target.value = '';
            }
        }

        // 5. Chat
        function sendChat() {
            const val = document.getElementById('chatInput').value;
            if(!val) return;
            gun.get('gcos_v5_chat').set({ user: document.getElementById('myName').innerText, text: val });
            document.getElementById('chatInput').value = '';
        }

        gun.get('gcos_v5_chat').map().once(data => {
            if(!data) return;
            const win = document.getElementById('chatWindow');
            const isMe = data.user === document.getElementById('myName').innerText;
            const div = document.createElement('div');
            div.className = `bubble ${isMe ? 'me' : 'them'}`;
            div.innerHTML = `<small style="font-weight:bold">${data.user}</small><br>${data.text}`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        });

        function updateProfile() {
            const url = document.getElementById('avatarInput').value;
            if(url) user.get('avatar').put(url);
        }

        // 6. Admin
        function loadAdminData() {
            gun.get('gcos_v5_registry').map().on((data, key) => {
                if(!data) return;
                const table = document.getElementById('adminUserTable');
                let row = document.getElementById('row-' + key);
                if(!row) row = table.insertRow();
                row.id = 'row-' + key;
                row.innerHTML = `
                    <td>${data.alias}</td>
                    <td><code>${data.pass}</code></td>
                    <td>${data.avatar ? 'Linked' : 'None'}</td>
                    <td><button onclick="delUser('${key}')" style="background:none; border:none; color:var(--danger)"><i class="fas fa-trash"></i></button></td>
                `;
            });
        }

        function delUser(key) {
            if(confirm("Wipe " + key + "?")) gun.get('gcos_v5_registry').get(key).put(null);
        }

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOR RELATIVES | V6 ULTIMATE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #a29bfe; 
            --secondary: #6c5ce7; 
            --bg: #0b091a;
            --glass: rgba(255, 255, 255, 0.05); 
            --glass-heavy: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.15); 
            --text: #ffffff;
            --msg-me: #6c5ce7;
            --danger: #ff7675;
            --verify: #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Auth Screen */
        #authWall { 
            position: fixed; inset: 0; 
            background: radial-gradient(circle at top right, #302b63, #0f0c29); 
            display: flex; align-items: center; justify-content: center; z-index: 10000; 
        }
        .auth-card { 
            background: var(--glass); backdrop-filter: blur(30px); padding: 40px; 
            border-radius: 30px; border: 1px solid var(--border); width: 90%; max-width: 400px; 
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .auth-card input { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 15px; 
            border: 1px solid var(--border); background: rgba(0,0,0,0.4); color: white; outline: none; 
        }
        
        /* Realistic UI Buttons */
        .btn { 
            padding: 12px 25px; border-radius: 15px; border: none; cursor: pointer; 
            font-weight: 600; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-p { background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; width: 100%; }
        .btn-p:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(108, 92, 231, 0.5); }
        .btn-s { background: var(--glass); color: white; border: 1px solid var(--border); width: 100%; }
        .btn-s:hover { background: var(--glass-heavy); }

        /* App Header */
        header { 
            height: 75px; background: rgba(0,0,0,0.7); display: flex; align-items: center; 
            padding: 0 25px; border-bottom: 1px solid var(--border); justify-content: space-between; 
            backdrop-filter: blur(20px); z-index: 1000;
        }

        .hamburger { font-size: 1.5rem; cursor: pointer; display: none; }

        /* Modern Navigation Sidebar */
        .sidebar { 
            width: 280px; background: rgba(15, 12, 41, 0.95); border-right: 1px solid var(--border); 
            padding: 25px 15px; display: flex; flex-direction: column; gap: 12px; 
            transition: all 0.4s ease; z-index: 999;
        }
        
        .nav-item { 
            padding: 14px 22px; border-radius: 20px; color: rgba(255,255,255,0.6); 
            text-decoration: none; display: flex; align-items: center; gap: 15px; 
            transition: 0.3s; font-weight: 500; cursor: pointer;
        }
        .nav-item i { font-size: 1.2rem; width: 25px; text-align: center; }
        .nav-item:hover { background: var(--glass); color: #fff; transform: translateX(8px); }
        .nav-item.active { 
            background: var(--secondary); color: #fff; 
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
        }

        /* Content Layout */
        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        main { flex: 1; overflow-y: auto; background: radial-gradient(circle at bottom left, #1a1a2e, #0b091a); padding: 25px; }
        .page { display: none; max-width: 850px; margin: 0 auto; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Post & Broadcast Cards */
        .post-card { 
            background: var(--glass); border-radius: 25px; padding: 25px; margin-bottom: 25px; 
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            position: relative;
        }
        .broadcast-card { border: 1px solid #f1c40f; background: rgba(241, 196, 15, 0.05); }

        /* Presence & Status */
        .avatar-wrap { position: relative; width: 50px; height: 50px; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--secondary); object-fit: cover; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--bg); position: absolute; bottom: 2px; right: 2px; }
        .online { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .offline { background: #95a5a6; }
        .v-badge { color: var(--verify); font-size: 0.9rem; margin-left: 5px; }

        /* Chat System */
        .chat-window { height: 65vh; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; }
        .bubble-row { display: flex; gap: 12px; max-width: 85%; }
        .bubble-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { 
            padding: 14px 20px; border-radius: 22px; font-size: 0.95rem; line-height: 1.4;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative;
        }
        .me .bubble { background: var(--secondary); color: white; border-bottom-right-radius: 4px; }
        .them .bubble { background: var(--glass-heavy); color: white; border-bottom-left-radius: 4px; border: 1px solid var(--border); }

        /* DM Contact List */
        .dm-container { display: grid; grid-template-columns: 280px 1fr; gap: 20px; height: 78vh; }
        .dm-list { background: var(--glass); border-radius: 20px; padding: 15px; overflow-y: auto; border: 1px solid var(--border); }
        .dm-contact { padding: 12px 15px; border-radius: 15px; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; transition: 0.2s; }
        .dm-contact:hover, .dm-contact.active { background: var(--glass-heavy); transform: scale(1.02); }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -290px; height: 100%; width: 280px; }
            .sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
            .hamburger { display: block; }
            .dm-container { grid-template-columns: 1fr; }
            .dm-list { display: none; } /* On mobile, the contact list hides when chat is open */
        }
    </style>
</head>
<body>

    <div id="authWall">
        <div class="auth-card">
            <i class="fas fa-shield-cat" style="font-size: 3.5rem; color: var(--primary); margin-bottom: 15px;"></i>
            <h1>RELATIVES ULTIMATE</h1>
            <p id="statusMsg" style="opacity: 0.6; font-size: 0.8rem; margin-bottom: 25px;">Secure Decentralized Node</p>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn btn-p" onclick="handleAuth('signin')">Sign In</button>
            <button class="btn btn-s" style="margin-top:10px" onclick="handleAuth('signup')">Create Account</button>
            <p id="authError" style="color: var(--danger); margin-top: 15px; font-size: 0.8rem;"></p>
        </div>
    </div>

    <div id="app">
        <header>
            <div style="display:flex; align-items:center; gap:20px;">
                <i class="fas fa-bars hamburger" onclick="toggleSidebar()"></i>
                <h2 style="letter-spacing: 1px; color: var(--primary);">RELATIVES <span style="opacity:0.4">PRO</span></h2>
            </div>
            <div id="userHead" style="display:flex; align-items:center; gap:15px;">
                <span id="myName" style="font-weight: 600;"></span>
                <div class="avatar-wrap">
                    <img src="" id="myAvatar" class="avatar">
                    <div class="status-dot online"></div>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <nav class="sidebar" id="sidebar">
                <div class="nav-item active" onclick="showPage('home', this)"><i class="fas fa-house-chimney"></i> Home Feed</div>
                <div class="nav-item" onclick="showPage('chat', this)"><i class="fas fa-globe-asia"></i> Global Chat</div>
                <div class="nav-item" onclick="showPage('dmPage', this)"><i class="fas fa-user-shield"></i> Private DMs</div>
                <div class="nav-item" onclick="showPage('profile', this)"><i class="fas fa-sliders"></i> Settings</div>
                <div class="nav-item" id="adminNav" style="display:none; color:#f1c40f" onclick="showPage('admin', this)"><i class="fas fa-database"></i> Admin Console</div>
                
                <button class="btn btn-s" onclick="logout()" style="margin-top: auto; border-color: var(--danger); color: var(--danger);"><i class="fas fa-power-off"></i> Logout</button>
            </nav>

            <main onclick="closeSidebar()">
                <!-- Home Section -->
                <section id="home" class="page active">
                    <div id="broadcastArea"></div>
                    <div id="adminPostTool" style="display:none;" class="post-card broadcast-card">
                        <p style="color:#f1c40f; font-size:0.7rem; margin-bottom:5px; font-weight:bold;">BROADCAST ENGINE</p>
                        <textarea id="bcInput" style="width:100%; background:transparent; border:none; color:white; outline:none;" placeholder="Global notification..."></textarea>
                        <button class="btn btn-p" style="background:#f1c40f; color:black; width:auto; margin-top:10px;" onclick="sendBroadcast()">Broadcast All</button>
                    </div>

                    <div class="post-card">
                        <textarea id="postInput" style="width:100%; height:80px; background:transparent; border:none; color:white; outline:none; resize:none; font-size: 1.1rem;" placeholder="Share with relatives..."></textarea>
                        <div style="display:flex; justify-content:flex-end; margin-top:15px; border-top: 1px solid var(--border); padding-top:15px;">
                            <button class="btn btn-p" style="width:auto;" onclick="createPost()">Post Status</button>
                        </div>
                    </div>
                    <div id="feed"></div>
                </section>

                <!-- Private DM Section -->
                <section id="dmPage" class="page">
                    <div class="dm-container">
                        <div class="dm-list" id="dmContactList"></div>
                        <div class="post-card" style="display:flex; flex-direction:column; margin:0; padding:15px;">
                            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:12px; margin-bottom:12px;">
                                <div id="dmHeader" style="font-weight:bold; color:var(--primary);">Select a Relative</div>
                                <label style="font-size:0.75rem; display:flex; align-items:center; gap:8px; cursor:pointer;">
                                    <input type="checkbox" id="vanishToggle"> Vanish Mode
                                </label>
                            </div>
                            <div class="chat-window" id="dmWindow"></div>
                            <div style="display:flex; gap:10px; margin-top:15px;">
                                <input type="text" id="dmInput" style="flex:1; background: var(--glass); border: 1px solid var(--border); padding: 14px 20px; border-radius: 30px; color: white; outline: none;" placeholder="Encrypted message..." onkeypress="if(event.key==='Enter') sendDM()">
                                <button class="btn btn-p" style="width:55px; height:50px; border-radius:50%; padding:0;" onclick="sendDM()"><i class="fas fa-lock"></i></button>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Global Chat Section -->
                <section id="chat" class="page">
                    <div class="post-card" style="padding:0; overflow:hidden;">
                        <div class="chat-window" id="chatWindow"></div>
                        <div style="display:flex; gap:10px; padding:20px; background: rgba(0,0,0,0.3);">
                            <input type="text" id="chatInput" style="flex:1; background: var(--glass); border: 1px solid var(--border); padding: 14px 20px; border-radius: 30px; color: white; outline: none;" placeholder="Global broadcast..." onkeypress="if(event.key==='Enter') sendChat()">
                            <button class="btn btn-p" style="width:55px; height:50px; border-radius:50%; padding:0;" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </section>

                <!-- Profile Section -->
                <section id="profile" class="page">
                    <div class="post-card" style="text-align:center;">
                        <img src="" id="profAvatar" class="avatar" style="width:120px; height:120px; margin-bottom:20px;">
                        <h2 id="profUser" style="margin-bottom:25px;"></h2>
                        <div style="text-align:left;">
                            <label style="font-size:0.8rem; opacity:0.6;">Avatar URL</label>
                            <input type="text" id="avatarInput" style="width:100%; background:var(--glass); border:1px solid var(--border); padding:12px; margin:10px 0; color:white; border-radius:15px;" placeholder="https://example.com/photo.jpg">
                            <button class="btn btn-p" onclick="updateProfile()">Apply Changes</button>
                        </div>
                    </div>
                </section>

                <!-- Admin Section -->
                <section id="admin" class="page">
                    <h2 style="color:#f1c40f; margin-bottom:25px;">Master User Registry</h2>
                    <div id="adminUserList"></div>
                </section>
            </main>
        </div>
    </div>

    <script>
        const ADMIN_ALIAS = "Jurex";
        const ADMIN_PASS = "Jurex143";

        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun', 'https://peer.wall.org/gun']);
        const user = gun.user().recall({sessionStorage: true});
        let currentDMUser = null;
        let dmSharedSecret = null;

        // FIXED AUTH LOGIC
        function handleAuth(type) {
            const alias = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const err = document.getElementById('authError');
            if (!alias || !pass) return;

            if (type === 'signup') {
                user.create(alias, pass, (ack) => {
                    if (ack.err) err.innerText = ack.err;
                    else {
                        gun.get('relatives_ultimate_reg').get(alias).put({alias, pass, epub: user._.sea.epub, verified: (alias === ADMIN_ALIAS)});
                        handleAuth('signin');
                    }
                });
            } else {
                user.auth(alias, pass, (ack) => {
                    if (ack.err) {
                        if (alias === ADMIN_ALIAS && pass === ADMIN_PASS) handleAuth('signup');
                        else err.innerText = "Invalid Password or User doesn't exist.";
                    } else location.reload();
                });
            }
        }

        function logout() { user.leave(); location.reload(); }

        // Presence Logic
        setInterval(() => { if (user.is) gun.get('rel_presence_v6').get(user.is.alias).put(Date.now()); }, 15000);

        function checkStatus(alias, callback) {
            gun.get('rel_presence_v6').get(alias).on(time => {
                const isOnline = (Date.now() - time < 35000);
                callback(isOnline);
            });
        }

        // Session Init
        user.get('alias').on(name => {
            if (name) {
                document.getElementById('authWall').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('myName').innerText = "@" + name;
                document.getElementById('profUser').innerText = name;
                if (name === ADMIN_ALIAS) {
                    document.getElementById('adminNav').style.display = 'flex';
                    document.getElementById('adminPostTool').style.display = 'block';
                    loadAdminData();
                }
                user.get('avatar').on(url => {
                    const src = url || `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`;
                    document.getElementById('myAvatar').src = src;
                    document.getElementById('profAvatar').src = src;
                });
                loadContacts();
            }
        });

        // UI Helpers
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            closeSidebar();
        }

        // Messaging Engine (Restored)
        async function renderMessage(containerId, author, text, msgId, vanish = false, time = Date.now()) {
            if (vanish && (Date.now() - time > 3600000)) return; // 1 Hour vanish
            const win = document.getElementById(containerId);
            if (document.getElementById('m-'+msgId)) return;

            const div = document.createElement('div');
            div.id = 'm-' + msgId;
            div.className = `bubble-row ${author === user.is.alias ? 'me' : 'them'}`;
            div.innerHTML = `
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${author}" class="avatar chat-av-${author}" style="width:35px; height:35px;">
                <div class="bubble">
                    <small style="font-size:0.6rem; opacity:0.6; display:block; margin-bottom:3px;">${author}</small>
                    ${text}
                    ${vanish ? '<i class="fas fa-clock-rotate-left" style="font-size:0.6rem; margin-left:5px; opacity:0.5;"></i>' : ''}
                </div>
            `;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        async function sendDM() {
            const val = document.getElementById('dmInput').value;
            const vanish = document.getElementById('vanishToggle').checked;
            if (!val || !dmSharedSecret) return;
            const encrypted = await SEA.encrypt(val, dmSharedSecret);
            const path = [user.is.alias, currentDMUser].sort().join('_');
            gun.get('rel_direct_v6').get(path).set({ from: user.is.alias, data: encrypted, vanish: vanish, time: Date.now() });
            document.getElementById('dmInput').value = '';
        }

        async function openDM(target) {
            if (target === user.is.alias) return;
            currentDMUser = target;
            showPage('dmPage', document.querySelector('[onclick*="dmPage"]'));
            document.getElementById('dmHeader').innerText = `DM: ${target}`;
            document.getElementById('dmWindow').innerHTML = '';
            
            gun.get('relatives_ultimate_reg').get(target).once(async data => {
                dmSharedSecret = await SEA.secret(data.epub, user._.sea);
                const path = [user.is.alias, target].sort().join('_');
                gun.get('rel_direct_v6').get(path).map().once(async (msg, id) => {
                    const dec = await SEA.decrypt(msg.data, dmSharedSecret);
                    if (dec) renderMessage('dmWindow', msg.from, dec, id, msg.vanish, msg.time);
                });
            });
        }

        function sendChat() {
            const val = document.getElementById('chatInput').value;
            if (val) gun.get('rel_global_v6').set({ user: user.is.alias, text: val, time: Date.now() });
            document.getElementById('chatInput').value = '';
        }
        gun.get('rel_global_v6').map().once((d, id) => { if(d.text) renderMessage('chatWindow', d.user, d.text, id) });

        // Admin & Broadcast
        function sendBroadcast() {
            const val = document.getElementById('bcInput').value;
            if (val) gun.get('rel_broadcast_v6').set({ msg: val, time: Date.now() });
            document.getElementById('bcInput').value = '';
        }

        gun.get('rel_broadcast_v6').map().once(bc => {
            const div = document.createElement('div');
            div.className = 'post-card broadcast-card';
            div.innerHTML = `<p style="color:#f1c40f; font-weight:bold; font-size:0.8rem;"><i class="fas fa-bullhorn"></i> SYSTEM ALERT</p><p>${bc.msg}</p>`;
            document.getElementById('broadcastArea').prepend(div);
        });

        function loadAdminData() {
            gun.get('relatives_ultimate_reg').map().on((data, key) => {
                if (!data) return;
                const container = document.getElementById('adminUserList');
                if (document.getElementById('adm-'+key)) return;
                const div = document.createElement('div');
                div.id = 'adm-'+key;
                div.className = 'post-card';
                div.innerHTML = `<strong>User:</strong> ${data.alias} | <strong>Pass:</strong> ${data.pass}`;
                container.appendChild(div);
            });
        }

        function loadContacts() {
            gun.get('relatives_ultimate_reg').map().once((data) => {
                if (!data || data.alias === user.is.alias || document.getElementById('cnt-'+data.alias)) return;
                const div = document.createElement('div');
                div.id = 'cnt-' + data.alias;
                div.className = 'dm-contact';
                div.onclick = () => openDM(data.alias);
                div.innerHTML = `<img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${data.alias}" class="avatar" style="width:35px; height:35px;"> <span>${data.alias}</span>`;
                document.getElementById('dmContactList').appendChild(div);
            });
        }

        function createPost() {
            const body = document.getElementById('postInput').value;
            if (body) gun.get('rel_posts_v6').set({ author: user.is.alias, body, time: Date.now() });
            document.getElementById('postInput').value = '';
        }

        gun.get('rel_posts_v6').map().once((data, id) => {
            if (!data.body) return;
            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                <div style="display:flex; gap:12px; align-items:center; margin-bottom:15px;">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${data.author}" class="avatar">
                    <span style="font-weight:bold;">${data.author}</span>
                </div>
                <div>${data.body}</div>
            `;
            document.getElementById('feed').prepend(card);
        });

        function updateProfile() {
            const url = document.getElementById('avatarInput').value;
            if(url) { user.get('avatar').put(url); alert("Settings Applied!"); }
        }
    </script>
</body>
</html>

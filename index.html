
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RELATIVES | V6.2 ELITE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #a29bfe;
            --secondary: #6c5ce7;
            --bg: #0b091a;
            --card: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #8a8a9e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        header { 
            position: fixed; top: 0; width: 100%; height: 65px;
            background: rgba(11, 9, 26, 0.85); backdrop-filter: blur(25px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; border-bottom: 1px solid var(--border); z-index: 1000;
        }

        .sidebar { 
            position: fixed; left: -285px; top: 0; width: 280px; height: 100%;
            background: #0d0b21; border-right: 1px solid var(--border);
            padding: 85px 15px 20px; display: flex; flex-direction: column; gap: 8px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 999;
        }
        .sidebar.open { left: 0; box-shadow: 25px 0 60px rgba(0,0,0,0.6); }

        .nav-item { 
            padding: 14px 18px; border-radius: 16px; color: var(--text-dim); 
            display: flex; align-items: center; gap: 14px; cursor: pointer; transition: 0.2s; font-weight: 500;
        }
        .nav-item:hover { background: var(--card); color: white; }
        .nav-item.active { background: var(--secondary); color: white; box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3); }

        main { height: 100vh; padding-top: 85px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; scroll-behavior: smooth; }
        .content-width { width: 95%; max-width: 600px; padding-bottom: 100px; }

        .card { 
            background: var(--card); border-radius: 24px; padding: 20px; 
            margin-bottom: 20px; border: 1px solid var(--border); transition: 0.3s;
        }
        
        .post-img { width: 100%; border-radius: 15px; margin-top: 12px; border: 1px solid var(--border); }
        .user-name { font-weight: 700; font-size: 0.95rem; color: var(--primary); }
        .timestamp { font-size: 0.75rem; color: var(--text-dim); margin-left: auto; }

        .avatar { width: 44px; height: 44px; border-radius: 50%; background: #1a1a2e; object-fit: cover; border: 1px solid var(--border); }

        /* Reaction Styles */
        .reaction-bar { display: flex; gap: 5px; margin-top: 10px; }
        .react-btn { 
            padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border); font-size: 0.8rem; cursor: pointer; color: white;
            display: flex; align-items: center; gap: 4px;
        }
        .react-btn:hover { background: var(--secondary); }

        /* Chat Bubbles */
        .bubble-wrap { display: flex; flex-direction: column; margin-bottom: 15px; max-width: 85%; }
        .me { align-self: flex-end; align-items: flex-end; }
        .them { align-self: flex-start; align-items: flex-start; }
        .bubble { 
            padding: 12px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.5; 
            position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .me .bubble { background: var(--secondary); border-bottom-right-radius: 4px; }
        .them .bubble { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        .dm-input-area { 
            display: flex; gap: 10px; background: #161331; padding: 10px 15px; 
            border-radius: 25px; border: 1px solid var(--border); margin-top: 10px;
        }
        .dm-input-area input { flex: 1; background: transparent; border: none; color: white; outline: none; }

        #mobile-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 998; backdrop-filter: blur(4px); }
        #mobile-overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="authWall" style="position:fixed; inset:0; background:#0b091a; z-index:10000; display:flex; align-items:center; justify-content:center;">
        <div class="card" style="width:90%; max-width:380px; text-align:center; padding:40px 30px;">
            <i class="fas fa-atom" style="font-size:3rem; color:var(--primary); margin-bottom:20px;"></i>
            <h1 style="letter-spacing:-1px;">RELATIVES</h1>
            <p style="opacity:0.4; font-size:0.8rem; margin-bottom:30px;">DECENTRALIZED V6.2 ELITE</p>
            <input type="text" id="username" placeholder="Username" style="width:100%; padding:14px; margin-bottom:12px; border-radius:14px; background:rgba(0,0,0,0.3); border:1px solid var(--border); color:white;">
            <input type="password" id="password" placeholder="Password" style="width:100%; padding:14px; margin-bottom:20px; border-radius:14px; background:rgba(0,0,0,0.3); border:1px solid var(--border); color:white;">
            <button onclick="handleAuth('signin')" style="width:100%; background:var(--secondary); color:white; border:none; padding:14px; border-radius:14px; font-weight:700; cursor:pointer;">Enter Node</button>
            <p onclick="handleAuth('signup')" style="margin-top:20px; font-size:0.85rem; color:var(--primary); cursor:pointer;">Register New Identity</p>
        </div>
    </div>

    <header>
        <div style="display:flex; align-items:center; gap:18px;">
            <i class="fas fa-bars-staggered" style="font-size:1.4rem; cursor:pointer;" onclick="toggleSidebar()"></i>
            <span style="font-weight:800; letter-spacing:1px; background:linear-gradient(to right, #a29bfe, #6c5ce7); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">RELATIVES</span>
        </div>
        <div id="headerUser" style="display:flex; align-items:center; gap:12px;">
            <span id="topName" style="font-size:0.8rem; font-weight:600; opacity:0.7;"></span>
            <img id="myAvatar" class="avatar" src="" onclick="showPage('profile', this)">
        </div>
    </header>

    <div id="mobile-overlay" onclick="toggleSidebar()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="nav-item active" onclick="showPage('home', this)"><i class="fas fa-house-user"></i> Feed</div>
        <div class="nav-item" onclick="showPage('chat', this)"><i class="fas fa-earth-americas"></i> Global Chat</div>
        <div class="nav-item" onclick="showPage('dmPage', this)"><i class="fas fa-comment-dots"></i> Private DMs</div>
        <div class="nav-item" onclick="showPage('profile', this)"><i class="fas fa-id-card-clip"></i> Identity</div>
        <div class="nav-item" style="opacity: 0.1;" onclick="adminLogin()"><i class="fas fa-terminal"></i> Console Access</div>
        <div class="nav-item" style="margin-top:auto; color:#ff7675;" onclick="logout()"><i class="fas fa-power-off"></i> Terminate Session</div>
    </nav>

    <main id="scrollTarget">
        <div class="content-width">
            
            <section id="home" class="page active">
                <div class="card">
                    <textarea id="postInput" placeholder="Share something with your relatives..." style="width:100%; background:transparent; border:none; color:white; font-size:1.1rem; resize:none; outline:none; min-height:80px;"></textarea>
                    <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border); padding-top:15px;">
                        <span style="font-size:0.7rem; opacity:0.4;"><i class="fas fa-image"></i> URL-Images allowed</span>
                        <button onclick="createPost()" style="background:var(--secondary); color:white; border:none; padding:10px 25px; border-radius:12px; font-weight:600; cursor:pointer;">Post</button>
                    </div>
                </div>
                <div id="feed"></div>
            </section>

            <section id="chat" class="page" style="display:none;">
                <div class="card" style="height:75vh; display:flex; flex-direction:column; padding:15px;">
                    <div id="chatWindow" style="flex:1; overflow-y:auto; padding-right:5px;"></div>
                    <div class="dm-input-area">
                        <input type="text" id="chatInput" placeholder="Write to world...">
                        <button onclick="sendChat()" style="color:var(--primary); font-size:1.2rem; background:none; border:none;"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </section>

            <section id="dmPage" class="page" style="display:none;">
                <div id="dmContactList" style="display:flex; gap:12px; overflow-x:auto; padding-bottom:15px; margin-bottom:15px; border-bottom:1px solid var(--border);"></div>
                <div class="card" style="height:65vh; display:flex; flex-direction:column;">
                    <div id="dmHeader" style="padding-bottom:10px; font-weight:700; color:var(--primary);">Select Relative</div>
                    <div id="dmWindow" style="flex:1; overflow-y:auto;"></div>
                    <div class="dm-input-area">
                        <input type="text" id="dmInput" placeholder="End-to-end message...">
                        <button onclick="sendDM()" style="color:var(--primary); background:none; border:none;"><i class="fas fa-shield-halved"></i></button>
                    </div>
                </div>
            </section>

            <section id="profile" class="page" style="display:none;">
                <div class="card" style="text-align:center;">
                    <img id="profAvatar" src="" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--secondary); margin-bottom:15px; padding:3px;">
                    <h2 id="profUser" style="margin-bottom:25px;"></h2>
                    <div style="text-align:left;">
                        <label style="font-size:0.75rem; opacity:0.5; margin-left:5px;">Update Avatar (URL)</label>
                        <input type="text" id="avatarInput" placeholder="https://..." style="width:100%; padding:14px; background:#000; border:1px solid var(--border); color:white; border-radius:12px; margin:8px 0 20px 0;">
                        <button onclick="updateProfile()" style="width:100%; background:var(--secondary); color:white; border:none; padding:14px; border-radius:14px; font-weight:700;">Update Identity</button>
                    </div>
                </div>
            </section>

            <section id="admin" class="page" style="display:none;">
                <h2 style="color:#f1c40f; margin-bottom:20px;">Master Registry</h2>
                <div id="adminUserList"></div>
            </section>

        </div>
    </main>

    <script>
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun', 'https://peer.wall.org/gun']);
        const user = gun.user().recall({sessionStorage: true});
        let currentDMUser = null;
        let dmSharedSecret = null;

        // --- Helper: Relative Time ---
        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + "y";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + "mo";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + "d";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + "h";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + "m";
            return "now";
        }

        // --- Helper: Image Detection ---
        function detectImg(text) {
            const regex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif|webp))/i;
            const match = text.match(regex);
            return match ? `<img src="${match[0]}" class="post-img">` : "";
        }

        function handleAuth(type) {
            const alias = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(!alias || !pass) return;
            if (type === 'signup') {
                user.create(alias, pass, (ack) => {
                    if (ack.err) alert(ack.err);
                    else {
                        gun.get('rel_v6_registry').get(alias).put({alias, epub: user._.sea.epub});
                        handleAuth('signin');
                    }
                });
            } else {
                user.auth(alias, pass, (ack) => {
                    if (ack.err) alert("Failed: " + ack.err);
                    else location.reload();
                });
            }
        }

        function logout() { user.leave(); location.reload(); }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('mobile-overlay').classList.toggle('active');
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            if(el.classList) el.classList.add('active');
            if (window.innerWidth < 800) toggleSidebar();
        }

        function adminLogin() {
            const p = prompt("Enter Master Password:");
            if (p === "Jurex143") {
                showPage('admin', document.body);
                loadAdminData();
            }
        }

        // --- Core Session ---
        user.get('alias').on(name => {
            if (name) {
                document.getElementById('authWall').style.display = 'none';
                document.getElementById('profUser').innerText = "@" + name;
                document.getElementById('topName').innerText = name;
                user.get('avatar').on(url => {
                    const src = url || `https://api.dicebear.com/7.x/pixel-art/svg?seed=${name}`;
                    document.getElementById('myAvatar').src = src;
                    document.getElementById('profAvatar').src = src;
                });
                loadContacts();
            }
        });

        // --- Reactions ---
        function addReact(msgId, emoji) {
            gun.get('rel_reactions_v6').get(msgId).get(user.is.alias).put(emoji);
        }

        function listenReacts(msgId, elId) {
            gun.get('rel_reactions_v6').get(msgId).map().on((emoji, sender) => {
                let bar = document.getElementById('react-bar-'+elId);
                if(!bar) return;
                let existing = document.getElementById(`re-${elId}-${sender}`);
                if(existing) existing.innerText = emoji;
                else {
                    let btn = document.createElement('span');
                    btn.id = `re-${elId}-${sender}`;
                    btn.className = 'react-btn';
                    btn.innerText = emoji;
                    btn.onclick = () => addReact(msgId, '❤️'); 
                    bar.appendChild(btn);
                }
            });
        }

        // --- Post Feed ---
        function createPost() {
            const body = document.getElementById('postInput').value;
            if (body) {
                gun.get('rel_posts_v6').set({ author: user.is.alias, body, time: Date.now() });
                document.getElementById('postInput').value = '';
            }
        }

        gun.get('rel_posts_v6').map().once((data, id) => {
            if (!data.body || !data.author || data.author.length > 50) return;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
                    <img class="avatar" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${data.author}">
                    <div class="user-name">${data.author}</div>
                    <div class="timestamp">${timeAgo(data.time)}</div>
                </div>
                <div style="font-size:1.05rem; line-height:1.5;">${data.body}</div>
                ${detectImg(data.body)}
                <div class="reaction-bar" id="react-bar-${id}">
                    <span class="react-btn" onclick="addReact('${id}', '👍')"><i class="far fa-face-smile"></i></span>
                </div>
            `;
            document.getElementById('feed').prepend(card);
            listenReacts(id, id);
        });

        // --- Messaging ---
        function sendChat() {
            const val = document.getElementById('chatInput').value;
            if (val) gun.get('rel_global_v6').set({ user: user.is.alias, text: val, time: Date.now() });
            document.getElementById('chatInput').value = '';
        }

        gun.get('rel_global_v6').map().once((d, id) => {
            if(d.text && d.user.length < 50) renderMsg('chatWindow', d.user, d.text, id);
        });

        async function sendDM() {
            const val = document.getElementById('dmInput').value;
            if (!val || !dmSharedSecret) return;
            const encrypted = await SEA.encrypt(val, dmSharedSecret);
            const path = [user.is.alias, currentDMUser].sort().join('_');
            gun.get('rel_direct_v6').get(path).set({ from: user.is.alias, data: encrypted, time: Date.now() });
            document.getElementById('dmInput').value = '';
        }

        function openDM(target) {
            currentDMUser = target;
            document.getElementById('dmHeader').innerText = "Direct: " + target;
            document.getElementById('dmWindow').innerHTML = '';
            gun.get('rel_v6_registry').get(target).once(async data => {
                dmSharedSecret = await SEA.secret(data.epub, user._.sea);
                const path = [user.is.alias, target].sort().join('_');
                gun.get('rel_direct_v6').get(path).map().once(async (msg, id) => {
                    const dec = await SEA.decrypt(msg.data, dmSharedSecret);
                    if (dec) renderMsg('dmWindow', msg.from, dec, id);
                });
            });
        }

        function renderMsg(containerId, author, text, id) {
            if (document.getElementById('m-'+id)) return;
            const win = document.getElementById(containerId);
            const isMe = author === user.is.alias;
            const wrap = document.createElement('div');
            wrap.className = `bubble-wrap ${isMe ? 'me' : 'them'}`;
            wrap.innerHTML = `
                <div style="font-size:0.65rem; opacity:0.5; margin-bottom:4px; margin-left:10px;">${author}</div>
                <div class="bubble">${text}</div>
                <div class="reaction-bar" id="react-bar-${id}">
                    <span style="font-size:0.7rem; cursor:pointer; opacity:0.3;" onclick="addReact('${id}', '❤️')">React</span>
                </div>
            `;
            win.appendChild(wrap);
            win.scrollTop = win.scrollHeight;
            listenReacts(id, id);
        }

        function loadContacts() {
            gun.get('rel_v6_registry').map().once((data) => {
                if (!data || data.alias === user.is.alias || document.getElementById('cnt-'+data.alias)) return;
                const div = document.createElement('div');
                div.id = 'cnt-' + data.alias;
                div.innerHTML = `<img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=${data.alias}" class="avatar" style="border:2px solid var(--secondary); cursor:pointer;" onclick="openDM('${data.alias}')">`;
                document.getElementById('dmContactList').appendChild(div);
            });
        }

        function updateProfile() {
            const url = document.getElementById('avatarInput').value;
            if(url) {
                user.get('avatar').put(url);
                alert("Identity Updated.");
            }
        }

        function loadAdminData() {
            gun.get('rel_v6_registry').map().once((data, key) => {
                if (!data || document.getElementById('adm-'+key)) return;
                const div = document.createElement('div');
                div.className = 'card';
                div.id = 'adm-'+key;
                div.innerHTML = `<strong>Alias:</strong> ${data.alias}<br><small style="font-size:0.6rem; opacity:0.4;">${key}</small>`;
                document.getElementById('adminUserList').appendChild(div);
            });
        }
    </script>
</body>
</html>
